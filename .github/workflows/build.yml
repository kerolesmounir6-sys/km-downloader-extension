name: Build & Deploy Extension

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Restore PEM key from secret
        run: |
          if ("${{ secrets.EXTENSION_PEM }}") {
            New-Item -ItemType Directory -Path "$env:USERPROFILE\.km_downloader\keys" -Force | Out-Null
            Set-Content -Path "$env:USERPROFILE\.km_downloader\keys\extension.pem" -Value "${{ secrets.EXTENSION_PEM }}" -Encoding UTF8
            Write-Output "PEM key restored from secret"
          } else {
            Write-Output "No PEM secret found - will generate new key"
          }
      - run: pip install cryptography
      - run: python build_extension.py
      - name: Copy index.html for Pages
        run: copy index.html build\
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
